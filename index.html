<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحة عربية بسيطة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0f4c75, #1b262c);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.4rem;
      letter-spacing: 1px;
    }

    nav {
      display: flex;
      gap: 1.5rem;
      list-style: none;
      margin-bottom: 2.5rem;
    }

    nav a {
      color: #a8dadc;
      text-decoration: none;
      font-size: 1.1rem;
      transition: color .2s;
    }

    nav a:hover { color: #f1faee; }

    main {
      max-width: 700px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      line-height: 1.9;
      font-size: 1.15rem;
    }

    footer {
      margin-top: 2.5rem;
      font-size: .9rem;
      opacity: .6;
    }
  </style>
</head>
<body>

  <header>
    <h1>مرحباً بالعالم</h1>
  </header>

  <ul>
    <li><a href="#">الرئيسية</a></li>
    <li><a href="#">عن الموقع</a></li>
    <li><a href="#">الخدمات</a></li>
    <li><a href="#">اتصل بنا</a></li>
  </ul>

  <main>
    <p>
      هذه صفحة ويب ثابتة بسيطة مكتوبة باللغة العربية. تدعم الاتجاه من اليمين إلى اليسار (RTL) وتستخدم تنسيقات CSS مضمنة لجعل التصميم نظيفًا وعصريًا. يمكنك تعديل المحتوى أو إضافة أقسام جديدة حسب الحاجة.
    </p>
  </main>

  <footer>
    &copy; 2026 جميع الحقوق محفوظة
  </footer>

</body>
</html>
